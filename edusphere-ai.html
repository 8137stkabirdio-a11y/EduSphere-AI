<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduSphere AI – Smart Coaching Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --accent: #1a3a5c;
    --accent2: #2e6da4;
    --gold: #c9922a;
    --gold-light: #fdf3e0;
    --text: #1a1a1a;
    --text2: #5a5a5a;
    --text3: #9a9a9a;
    --border: rgba(0,0,0,0.1);
    --user-bubble: #1a3a5c;
    --bot-bubble: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP HEADER */
  header {
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 64px;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    box-shadow: 0 2px 16px rgba(0,0,0,0.2);
  }

  .logo-ring {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: #fff;
    line-height: 1.2;
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }

  .status-dot::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* QUICK CHIPS */
  .chips-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .chips-bar::-webkit-scrollbar { display: none; }

  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .chip svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* MESSAGES AREA */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

  /* WELCOME CARD */
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    box-shadow: var(--shadow);
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .welcome-card .icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }

  .welcome-card .icon svg { width: 28px; height: 28px; color: #fff; }

  .welcome-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .welcome-card p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 18px;
  }

  .welcome-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .welcome-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .welcome-btn:hover { background: var(--gold-light); border-color: var(--gold); }
  .welcome-btn .wb-icon { font-size: 18px; margin-bottom: 4px; }
  .welcome-btn .wb-label { font-size: 11px; font-weight: 600; color: var(--accent); display: block; }
  .welcome-btn .wb-sub { font-size: 10px; color: var(--text3); }

  /* MESSAGE ROWS */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeSlide 0.25s ease;
  }
  @keyframes fadeSlide { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
  }

  .avatar.bot { background: var(--accent); color: #fff; font-family: 'DM Serif Display', serif; font-size: 14px; }
  .avatar.user-av { background: var(--gold); color: #fff; }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    position: relative;
  }

  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: var(--shadow);
  }

  .bubble.user {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 3px; }
  .bubble strong { font-weight: 600; }
  .bubble h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--accent); }

  .timestamp {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    padding: 0 4px;
  }
  .msg-row.user .timestamp { text-align: right; }

  /* TYPING INDICATOR */
  .typing-row { display: flex; gap: 10px; align-items: flex-start; }
  .typing-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
    display: flex; gap: 5px; align-items: center;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(1)} 40%{transform:scale(1.4)} }

  /* INPUT BAR */
  .input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 42px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    transition: border-color 0.15s;
    overflow-y: auto;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--text3); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    color: #fff;
  }
  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:disabled { background: var(--text3); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: var(--text3);
    padding: 6px 0 2px;
  }

  /* SUBJECT TAG */
  .subject-tag {
    display: inline-block;
    background: var(--gold-light);
    color: var(--gold);
    border: 1px solid rgba(201,146,42,0.25);
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  @media (max-width: 480px) {
    .bubble { max-width: 85%; }
    .welcome-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

  <div class="welcome-card" id="welcomeCard">

<script>
const SYSTEM_PROMPT = `You are EduSphere AI, the official AI Assistant of EduSphere Coaching Institute.

Your primary goal is to assist students, parents, teachers, and visitors by providing accurate information, academic support, notices, schedules, and administrative assistance.

YOUR RESPONSIBILITIES:
1. ADMISSION SUPPORT - Help with admission process, required documents, course selection, batch information, seat availability, scholarship information, registration. Collect: Student Name, Phone Number, Email Address, Class/Grade, School Name, Preferred Course, City.
2. COURSE INFORMATION - JEE Preparation, NEET Preparation, Foundation Courses, Olympiad Courses, Board Exam Preparation, Computer Science, Coding Programs, English Speaking, Competitive Exam Courses. For each: Duration, Subjects Covered, Batch Timings, Eligibility, Learning Outcomes, Teaching Methodology.
3. FEES AND PAYMENT - Fee structure, payment options, installment plans, scholarship discounts.
4. DEMO CLASS REGISTRATION - Register students for free demo classes, collect their details.
5. NOTES MANAGEMENT - When students ask for notes, identify subject and chapter. Example response: "Physics Notes Available: Chapter 1 - Units & Measurements, Chapter 2 - Motion, Chapter 3 - Laws of Motion. Available as PDF Notes, Quick Revision Notes, Important Questions, Practice Worksheets."
6. NOTICE BOARD - Show notices with Date, Title, Description, Priority (Academic, Holiday, Exam, Event, Assignment, Scholarship, Emergency notices). Example: "NOTICE — Physics Test on 15 June 2026 at 10AM covering Chapters 1-5."
7. CLASS TIMETABLE - Daily schedule: 09:00 AM Physics, 10:30 AM Mathematics, 12:00 PM Chemistry, 02:00 PM Biology (for science batches). Provide weekly timetable on request.
8. EXAM SCHEDULE - Upcoming tests, syllabi, instructions. Next tests: Mathematics (20 June 2026) - Quadratic Equations & Sequences; Physics (22 June 2026) - Thermodynamics.
9. ASSIGNMENT TRACKER - Pending assignments, submission dates, guidelines.
10. ATTENDANCE - Students can check attendance percentage, missed classes (example: 92% attendance, 46 attended, 4 missed).
11. STUDY MATERIAL - Recommend notes, practice papers, PYQs, mock tests, formula sheets.
12. PARENT SUPPORT - Performance reports, attendance, progress updates, parent meetings info.
13. FACULTY - Physics: Dr. Ramesh Sharma (15 yrs exp); Maths: Ms. Priya Mehta (12 yrs); Chemistry: Mr. Ankit Verma (10 yrs); Biology: Dr. Sunita Patel (14 yrs).
14. EVENTS - Upcoming: Science Olympiad (25 June), Annual Day (10 July), Career Counselling Session (28 June).
15. GENERAL ASSISTANCE - Friendly encouragement, study tips, motivation.

COMMUNICATION STYLE:
- Be friendly, professional, helpful, encouraging, accurate, student-focused.
- Use clear formatting with bullet points and sections when listing items.
- Respond in the same language the user uses (English, Hindi, or Gujarati).
- Never guarantee exam ranks or share confidential data.
- Always motivate students toward learning and academic success.

When responding, use clear structure with relevant headings and bullet points to make information scannable.`;

const messages = [];
let isLoading = false;

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendChip(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/### (.+)/g, '<h3>$1</h3>')
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/^• (.+)/gm, '<li>$1</li>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)/gm, '<li>$2</li>')
    .replace(/(<li>.*<\/li>)/gs, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br/>')
    .replace(/^(?!<)(.+)/gm, (m) => m.startsWith('<') ? m : `<p>${m}</p>`);
}

function addMessage(role, text) {
  const welcome = document.getElementById('welcomeCard');
  if (welcome) welcome.remove();

  const container = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = `avatar ${role === 'user' ? 'user-av' : 'bot'}`;
  avatarEl.textContent = role === 'user' ? 'U' : 'E';

  const inner = document.createElement('div');
  inner.style.display = 'flex';
  inner.style.flexDirection = 'column';
  inner.style.maxWidth = '75%';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role === 'user' ? 'user' : 'bot'}`;
  bubble.innerHTML = role === 'user' ? `<p>${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>` : formatText(text);

  const ts = document.createElement('div');
  ts.className = 'timestamp';
  ts.textContent = getTime();

  inner.appendChild(bubble);
  inner.appendChild(ts);

  if (role === 'user') {
    row.appendChild(inner);
    row.appendChild(avatarEl);
  } else {
    row.appendChild(avatarEl);
    row.appendChild(inner);
  }

  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const typingRow = document.createElement('div');
  typingRow.className = 'typing-row';
  typingRow.id = 'typingIndicator';

  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = 'E';

  const tb = document.createElement('div');
  tb.className = 'typing-bubble';
  tb.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  typingRow.appendChild(av);
  typingRow.appendChild(tb);
  container.appendChild(typingRow);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    hideTyping();

    const reply = data.content?.map(b => b.text || '').join('') || 'Sorry, I could not get a response. Please try again.';
    messages.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);

  } catch (err) {
    hideTyping();
    addMessage('assistant', 'I\'m having trouble connecting right now. Please check your internet connection and try again.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
